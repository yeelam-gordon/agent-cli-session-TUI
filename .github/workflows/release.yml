name: Release

on:
  push:
    tags: [ "v*" ]  # Trigger on version tags like v0.1.0

permissions:
  contents: write  # Needed to create GitHub releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-session-tui.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-session-tui
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agent-session-tui

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: rustup target add ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir dist
        cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
        cp config.toml.example dist/
        cp README.md dist/
      shell: bash

    - name: Package (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir dist
        cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
        cp config.toml.example dist/
        cp README.md dist/
        chmod +x dist/${{ matrix.artifact }}

    - name: Create archive (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path dist/* -DestinationPath agent-session-tui-${{ matrix.target }}.zip

    - name: Create archive (Unix)
      if: matrix.os != 'windows-latest'
      run: tar -czf agent-session-tui-${{ matrix.target }}.tar.gz -C dist .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agent-session-tui-${{ matrix.target }}
        path: agent-session-tui-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: artifacts/**/*
