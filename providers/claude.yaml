# Claude Code — essentials only.
#
# WHY each section exists:
#   discovery      — WHERE: ~/.claude/projects/<encoded-cwd>/<uuid>.jsonl
#                    The .jsonl file IS the session (file_per_session).
#   hide_paths_glob — skip Claude's internal memory/ and subagents/ dirs
#   session_id     — filename stem IS the UUID
#   cwd            — decode the parent dir name (drive-dash encoding: C--Users-john → C:\Users\john)
#   filter_out     — drop metadata-only lines (isMeta) and synthetic model lines
#   title          — first user message
#   state_signals  — last event type: "assistant" = waiting, "user" = busy
#   process_match  — find `claude` process by --session-id/--continue/--resume flags
#   tab_title      — Claude sets tab title with ✳ prefix (literal match)

name: claude
display_name: Claude Code

discovery:
  base_dir: ${HOME}/.claude/projects
  strategy: file_per_session
  glob: "*/*.jsonl"
  hide_paths_glob:                     # exclude internal sessions
    - "memory/*.jsonl"
    - "*/subagents/*.jsonl"

session_id:
  source: filename_stem

cwd:
  source: dirname_decode               # parent dir is drive-dash encoded cwd
  decoder: drive_dash
  backtrack: true                      # probe disk to disambiguate hyphens
  from_parent: true

events:
  filter_out:
    - "isMeta == true"
    - 'message.model == "<synthetic>"'

fields:
  title:
    strategy: first_matching_event
    where: 'type == "user"'
    path: "message.content // message.text // content"
    transforms: [first_line, "truncate:60"]
  updated_at:
    strategy: file_mtime

state_signals:
  last_event_map:
    "assistant": { interaction: waiting_input }
    "user":      { interaction: busy }

process_match:
  strategy: cmdline
  executable: claude
  not_contains: copilot                # exclude Copilot CLI processes
  id_match_kind: flag
  flag: ["--session-id", "--continue", "--resume"]
  recently_active_secs: 10

tab_title:
  strategy: literal
  value: "✳"