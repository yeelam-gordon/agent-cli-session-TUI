# Claude Code — minimal provider (list-only TUI, no detail pane).
name: claude
display_name: Claude Code

capabilities:
  supports_resume: true
  supports_discovery: true
  supports_logs: false
  supports_wait_detection: true
  supports_kill: true
  supports_archive: true
  supports_summary_extraction: false

discovery:
  base_dir: ${HOME}/.claude/projects
  strategy: file_per_session
  glob: "*/*.jsonl"
  tail_bytes: 524288
  hide_paths_glob:
    - "memory/*.jsonl"
    - "*/subagents/*.jsonl"

session_id:
  source: filename_stem

cwd:
  source: dirname_decode
  decoder: drive_dash
  backtrack: true
  from_parent: true

events:
  format: jsonl
  filter_out:
    - "isMeta == true"
    - 'message.model == "<synthetic>"'

fields:
  discard_if_empty: true
  title:
    strategy: first_matching_event
    where: 'type == "user"'
    path: "message.content // message.text // content"
    transforms: [first_line, "truncate:60"]
  updated_at:
    strategy: file_mtime

state_signals:
  idle_threshold_seconds: 1800
  last_event_map:
    "assistant": { interaction: waiting_input }
    "user":      { interaction: busy }

process_match:
  strategy: cmdline
  executable: claude
  not_contains: copilot
  id_match_kind: flag
  flag: ["--session-id", "--continue", "--resume"]
  recently_active_secs: 10

tab_title:
  strategy: literal
  value: "✳"