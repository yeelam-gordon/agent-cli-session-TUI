# Codex CLI — essentials only.
#
# WHY each section exists:
#   discovery      — WHERE: ~/.codex/sessions/YYYY/MM/DD/*.jsonl (date-partitioned)
#   session_id     — UUID from first event's payload.id (not filename)
#   cwd            — from session_meta event's payload.cwd
#   filter_out     — drop token_count events (constant noise during streaming)
#   title          — first real user message (skip "developer" bootstrap instructions)
#   state_signals  — event_predicates because Codex uses nested payload.type, not outer type
#   process_match  — Codex passes UUID as positional cmdline arg
#   tab_title      — cwd folder basename (Codex sets no in-band title)

name: codex
display_name: Codex CLI

discovery:
  base_dir: ${HOME}/.codex/sessions
  strategy: date_partitioned
  pattern: "{YYYY}/{MM}/{DD}/*.jsonl"   # required by schema (not used at runtime)

session_id:
  source: first_event_field
  field: "payload.id"

cwd:
  source: event_field
  event_type: "session_meta"
  field: "payload.cwd"

events:
  filter_out:
    - 'type == "event_msg" and payload.type == "token_count"'

fields:
  title:
    strategy: first_matching_event
    where: 'type == "response_item" and payload.role == "user" and payload.type == "message"'
    path: 'payload.content.0.text // payload.content.0.input_text // payload.content.0.output_text'
    transforms: [first_line, "truncate:60"]
  updated_at:
    strategy: file_mtime

state_signals:
  event_predicates:                    # Codex needs nested predicates (payload.type)
    - where: 'type == "event_msg" and payload.type == "task_started"'
      interaction: busy
    - where: 'type == "event_msg" and payload.type == "task_complete"'
      interaction: waiting_input
    - where: 'type == "event_msg" and payload.type == "user_message"'
      interaction: busy
    - where: 'type == "response_item" and payload.role == "assistant" and payload.type == "message"'
      interaction: waiting_input
    - where: 'type == "response_item" and payload.role == "user" and payload.type == "message"'
      interaction: busy

process_match:
  strategy: cmdline
  executable: codex
  id_match_kind: positional_uuid       # UUID is a positional arg, no flag prefix
  recently_active_secs: 15

tab_title:
  strategy: cwd_basename