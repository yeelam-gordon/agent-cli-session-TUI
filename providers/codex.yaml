# Codex CLI — minimal provider (list-only TUI, no detail pane).
name: codex
display_name: Codex CLI

capabilities:
  supports_resume: true
  supports_discovery: true
  supports_logs: false
  supports_wait_detection: true
  supports_kill: true
  supports_archive: true
  supports_summary_extraction: false

discovery:
  base_dir: ${HOME}/.codex/sessions
  strategy: date_partitioned
  pattern: "{YYYY}/{MM}/{DD}/*.jsonl"
  tail_bytes: 524288

session_id:
  source: first_event_field
  field: "payload.id"

cwd:
  source: event_field
  event_type: "session_meta"
  field: "payload.cwd"

events:
  format: jsonl
  filter_out:
    - 'type == "event_msg" and payload.type == "token_count"'

fields:
  discard_if_empty: true
  title:
    strategy: first_matching_event
    where: 'type == "response_item" and payload.role == "user" and payload.type == "message"'
    path: 'payload.content.0.text // payload.content.0.input_text // payload.content.0.output_text'
    transforms: [first_line, "truncate:60"]
  updated_at:
    strategy: file_mtime

state_signals:
  idle_threshold_seconds: 1800
  event_predicates:
    - where: 'type == "event_msg" and payload.type == "task_started"'
      interaction: busy
    - where: 'type == "event_msg" and payload.type == "task_complete"'
      interaction: waiting_input
    - where: 'type == "event_msg" and payload.type == "user_message"'
      interaction: busy
    - where: 'type == "response_item" and payload.role == "assistant" and payload.type == "message"'
      interaction: waiting_input
    - where: 'type == "response_item" and payload.role == "user" and payload.type == "message"'
      interaction: busy

process_match:
  strategy: cmdline
  executable: codex
  id_match_kind: positional_uuid
  recently_active_secs: 15

tab_title:
  strategy: cwd_basename