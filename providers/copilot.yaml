# Copilot CLI — minimal provider (list-only TUI, no detail pane).
name: copilot
display_name: Copilot

capabilities:
  supports_resume: true
  supports_discovery: true
  supports_logs: false
  supports_wait_detection: true
  supports_kill: true
  supports_archive: true
  supports_summary_extraction: false

discovery:
  base_dir: ${HOME}/.copilot/session-state
  strategy: dir_per_session
  metadata_file: workspace.yaml
  events_file: events.jsonl
  tail_bytes: 2097152
  lockfile_pattern: "inuse.*.lock"

session_id:
  source: dirname

cwd:
  source: yaml_field
  path: cwd

events:
  format: jsonl
  filter_out: []

fields:
  discard_if_empty: true
  title:
    strategy: metadata_field
    path: summary
    transforms: [strip_newlines, trim, "truncate:60"]
    fallback:
      - strategy: first_matching_event
        where: 'type == "user.message"'
        path: data.content // data.message // data.text
        transforms: [strip_newlines, trim, "truncate:60"]
  updated_at:
    strategy: file_mtime

state_signals:
  last_event_map:
    "assistant.turn_start":     { interaction: busy }
    "assistant.turn_end":       { interaction: waiting_input }
    "assistant.turn_complete":  { interaction: waiting_input }
    "session.task_complete":    { interaction: waiting_input }
    "user.message":             { interaction: busy }
    "tool.execution_start":     { interaction: busy }
    "tool.execution_complete":  { interaction: busy }
  idle_threshold_seconds: 1800

process_match:
  strategy: lockfile
  lockfile_pattern: "inuse.*.lock"
  pid_extract_regex: 'inuse\.(\d+)\.lock'

tab_title:
  strategy: from_tool_call
  where: 'type == "assistant.message"'
  iterate_path: data.toolRequests
  tool_name_path: name
  tool_name: report_intent
  args_path: arguments
  arg_field: intent