# Copilot CLI — essentials only.
#
# WHY each section exists:
#   name/display_name  — identity: which provider this is
#   discovery          — WHERE to find sessions on disk
#   session_id         — HOW to extract the unique session identifier
#   cwd                — HOW to resolve the working directory (needed for launch + tab title)
#   events.filter_out  — WHICH event types are noise (Copilot has none, so omitted — defaults empty)
#   fields.title       — WHAT to show in the session list
#   fields.updated_at  — WHEN the session was last active
#   state_signals      — IS IT busy or waiting? (maps event types to interaction state)
#   process_match      — IS IT running? (how to find the live OS process)
#   tab_title          — HOW to match/extract the terminal tab title

name: copilot
display_name: Copilot

discovery:
  base_dir: ${HOME}/.copilot/session-state
  strategy: dir_per_session
  metadata_file: workspace.yaml        # contains cwd + summary
  events_file: events.jsonl            # the JSONL event stream inside each session dir

session_id:
  source: dirname                      # session dir name IS the UUID

cwd:
  source: yaml_field                   # read from workspace.yaml
  path: cwd

fields:
  title:
    strategy: metadata_field           # prefer workspace.yaml summary
    path: summary
    transforms: [strip_newlines, trim, "truncate:60"]
    fallback:
      - strategy: first_matching_event # no summary yet? use first user message
        where: 'type == "user.message"'
        path: data.content // data.message // data.text
        transforms: [strip_newlines, trim, "truncate:60"]
  updated_at:
    strategy: file_mtime               # events.jsonl mtime = real-time activity

state_signals:
  last_event_map:
    "assistant.turn_start":     { interaction: busy }
    "assistant.turn_end":       { interaction: waiting_input }
    "assistant.turn_complete":  { interaction: waiting_input }
    "session.task_complete":    { interaction: waiting_input }
    "user.message":             { interaction: busy }
    "tool.execution_start":     { interaction: busy }
    "tool.execution_complete":  { interaction: busy }

process_match:
  strategy: lockfile                   # Copilot uses inuse.<PID>.lock files
  lockfile_pattern: "inuse.*.lock"
  pid_extract_regex: 'inuse\.(\d+)\.lock'

tab_title:
  strategy: from_tool_call             # extract from report_intent tool calls
  where: 'type == "assistant.message"'
  iterate_path: data.toolRequests
  tool_name_path: name
  tool_name: report_intent
  args_path: arguments
  arg_field: intent