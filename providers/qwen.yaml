# Qwen Code — minimal provider (list-only TUI, no detail pane).
name: qwen
display_name: Qwen Code

capabilities:
  supports_resume: true
  supports_discovery: true
  supports_logs: false
  supports_wait_detection: true
  supports_kill: true
  supports_archive: true
  supports_summary_extraction: false

discovery:
  base_dir: ${HOME}/.qwen/projects
  strategy: file_per_session
  glob: "*/chats/*.jsonl"
  tail_bytes: 524288

session_id:
  source: filename_stem

cwd:
  source: event_field
  event_type: "user"
  field: "cwd"

events:
  format: jsonl
  filter_out:
    - 'type == "system"'

fields:
  discard_if_empty: true
  title:
    strategy: first_matching_event
    where: 'type == "user"'
    path: "message.parts.0.text"
    transforms: [first_line, "truncate:60"]
  updated_at:
    strategy: file_mtime

state_signals:
  idle_threshold_seconds: 1800
  last_event_map:
    "assistant": { interaction: waiting_input }
    "user":      { interaction: busy }

process_match:
  strategy: cmdline
  executable: qwen
  id_match_kind: positional_uuid
  recently_active_secs: 1800

tab_title:
  strategy: cwd_basename