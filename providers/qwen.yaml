# Qwen Code — essentials only.
#
# WHY each section exists:
#   discovery      — WHERE: ~/.qwen/projects/<encoded-cwd>/chats/<uuid>.jsonl
#   session_id     — filename stem IS the UUID
#   cwd            — every event carries a literal `cwd` field (no decoding needed)
#   filter_out     — drop system/ui_telemetry events (constant noise)
#   title          — first user message (message.parts[0].text)
#   state_signals  — same as Claude: last "assistant" = waiting, last "user" = busy
#   process_match  — UUID is positional arg (resumed sessions only); 30min fallback
#   tab_title      — cwd folder basename

name: qwen
display_name: Qwen Code

discovery:
  base_dir: ${HOME}/.qwen/projects
  strategy: file_per_session
  glob: "*/chats/*.jsonl"

session_id:
  source: filename_stem

cwd:
  source: event_field
  event_type: "user"
  field: "cwd"

events:
  filter_out:
    - 'type == "system"'

fields:
  title:
    strategy: first_matching_event
    where: 'type == "user"'
    path: "message.parts.0.text"
    transforms: [first_line, "truncate:60"]
  updated_at:
    strategy: file_mtime

state_signals:
  last_event_map:
    "assistant": { interaction: waiting_input }
    "user":      { interaction: busy }

process_match:
  strategy: cmdline
  executable: qwen
  id_match_kind: positional_uuid
  recently_active_secs: 1800           # fresh sessions have no UUID on cmdline

tab_title:
  strategy: cwd_basename