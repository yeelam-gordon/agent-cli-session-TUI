# Claude Code — v3 schema (explicit sources, unified extract)
name: claude
display_name: Claude Code

# ── FILES: what we read ──────────────────────────────────────
# Claude is file_per_session: the .jsonl file IS both session + events.
# No separate metadata file.
files:
  events: "{session_file}"             # the discovered .jsonl IS the events

# ── DISCOVERY: how to find sessions ──────────────────────────
discovery:
  base_dir: ${HOME}/.claude/projects
  strategy: file_per_session
  glob: "*/*.jsonl"
  hide_paths_glob:
    - "memory/*.jsonl"                 # Claude's internal memory dir
    - "*/subagents/*.jsonl"            # hidden sub-agent sessions

# ── EVENTS: pre-processing before extraction ─────────────────
events:
  filter_out:
    - "isMeta == true"                 # metadata-only lines
    - 'message.model == "<synthetic>"' # synthetic model placeholders

# ── EXTRACT: unified field contract ──────────────────────────
extract:
  session_id:
    from: filename_stem                # filename without .jsonl extension

  cwd:
    from: dirname                      # parent dir is drive-dash encoded cwd
    decoder: drive_dash                # C--Users-john → C:\Users\john
    backtrack: true                    # probe disk to disambiguate hyphens
    from_parent: true                  # decode the PARENT dir, not the file

  title:
    from: events                       # first user message
    where: 'type == "user"'
    path: "message.content // message.text // content"
    transforms: [first_line, "truncate:60"]

  updated_at:
    from: events
    strategy: file_mtime

  state:
    from: events
    last_event_map:
      "assistant": waiting             # Claude responded → waiting for user
      "user":      busy                # user sent → Claude is working

  tab_title:
    from: literal                      # Claude sets ✳ prefix at runtime (not in JSONL)
    value: "✳"

# ── PROCESS: is it running? ──────────────────────────────────
process:
  executable: claude
  match:
    field: session_id                  # what to look for
    on: flag                           # where: after one of these flags on cmdline
    flag: ["--session-id", "--continue", "--resume"]
  fallback:
    recently_active_secs: 10           # last resort if no flag match
