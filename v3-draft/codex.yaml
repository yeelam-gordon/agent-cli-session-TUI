# Codex CLI — v3 schema (explicit sources, unified extract)
name: codex
display_name: Codex CLI

# ── FILES: what we read ──────────────────────────────────────
files:
  events: "{session_file}"             # one .jsonl per session (date-partitioned)

# ── DISCOVERY: how to find sessions ──────────────────────────
discovery:
  base_dir: ${HOME}/.codex/sessions
  strategy: date_partitioned
  pattern: "{YYYY}/{MM}/{DD}/*.jsonl"

# ── EVENTS: pre-processing before extraction ─────────────────
events:
  filter_out:
    - 'type == "event_msg" and payload.type == "token_count"'  # streaming noise

# ── EXTRACT: unified field contract ──────────────────────────
extract:
  session_id:
    from: events                       # UUID in first line's payload.id
    path: "payload.id"
    strategy: first_event_field

  cwd:
    from: events                       # session_meta event carries literal cwd
    where: 'type == "session_meta"'
    path: "payload.cwd"

  title:
    from: events                       # first real user message (skip "developer" bootstrap)
    where: 'type == "response_item" and payload.role == "user" and payload.type == "message"'
    path: 'payload.content.0.text // payload.content.0.input_text // payload.content.0.output_text'
    transforms: [first_line, "truncate:60"]

  updated_at:
    from: events
    strategy: file_mtime

  state:
    from: events
    event_predicates:                  # Codex needs nested predicates (payload.type)
      - where: 'type == "event_msg" and payload.type == "task_started"'
        value: busy
      - where: 'type == "event_msg" and payload.type == "task_complete"'
        value: waiting
      - where: 'type == "event_msg" and payload.type == "user_message"'
        value: busy
      - where: 'type == "response_item" and payload.role == "assistant" and payload.type == "message"'
        value: waiting
      - where: 'type == "response_item" and payload.role == "user" and payload.type == "message"'
        value: busy

  tab_title:
    from: cwd                          # cwd folder basename (no in-band title)
    strategy: cwd_basename

# ── PROCESS: is it running? ──────────────────────────────────
process:
  executable: codex
  match:
    field: session_id                  # what to look for
    on: positional_arg                 # where: bare arg on cmdline (no flag prefix)
  fallback:
    recently_active_secs: 15
