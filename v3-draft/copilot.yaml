# Copilot CLI — v3 schema (explicit sources, unified extract)
name: copilot
display_name: Copilot

# ── FILES: what we read ──────────────────────────────────────
# Declare all source files by name. Every `from:` below references one.
files:
  metadata: workspace.yaml             # per-session YAML (cwd, summary)
  events: events.jsonl                 # append-only JSONL event stream

# ── DISCOVERY: how to find sessions ──────────────────────────
discovery:
  base_dir: ${HOME}/.copilot/session-state
  strategy: dir_per_session            # one folder per session, files inside

# ── EVENTS: pre-processing before extraction ─────────────────
events:
  filter_out: []                       # Copilot's stream is clean, no noise

# ── EXTRACT: unified field contract ──────────────────────────
# Every provider must produce these fields for the TUI viewmodel.
# `from:` says which declared file to read. No guessing.
extract:
  session_id:
    from: dirname                      # the folder name IS the UUID

  cwd:
    from: metadata                     # workspace.yaml → cwd field
    path: cwd

  title:
    from: metadata                     # workspace.yaml → summary field
    path: summary
    transforms: [strip_newlines, trim, "truncate:60"]
    fallback:
      - from: events                   # no summary yet? first user message
        where: 'type == "user.message"'
        path: data.content // data.message // data.text
        transforms: [strip_newlines, trim, "truncate:60"]

  updated_at:
    from: events
    strategy: file_mtime               # events.jsonl mtime = last activity

  state:
    from: events                       # scan tail of events, most recent first
    last_event_map:
      "assistant.turn_start":    busy
      "assistant.turn_end":      waiting
      "assistant.turn_complete": waiting
      "session.task_complete":   waiting
      "user.message":            busy
      "tool.execution_start":    busy
      "tool.execution_complete": busy

  tab_title:
    from: events                       # extract from report_intent tool calls
    strategy: from_tool_call
    where: 'type == "assistant.message"'
    iterate_path: data.toolRequests
    tool_name_path: name
    tool_name: report_intent
    args_path: arguments
    arg_field: intent

# ── PROCESS: is it running? ──────────────────────────────────
process:
  match:
    field: session_id                  # what to look for
    on: lockfile                       # where: inuse.<PID>.lock files in session dir
    pattern: "inuse.*.lock"
    pid_regex: 'inuse\.(\d+)\.lock'
