# Gemini CLI — v3 schema (explicit sources, unified extract)
name: gemini
display_name: Gemini CLI

# ── FILES: what we read ──────────────────────────────────────
files:
  events: "{session_file}"             # one .jsonl per session

# ── DISCOVERY: how to find sessions ──────────────────────────
discovery:
  base_dir: ${HOME}/.gemini/tmp
  strategy: file_per_session
  glob: "*/chats/session-*.jsonl"      # glob shape excludes subagent subdirs

# ── EVENTS: pre-processing before extraction ─────────────────
events:
  filter_out:
    - '$set != null'                   # metadata-only $set records
    - 'type == "info"'                 # status messages ("Request cancelled.")

# ── EXTRACT: unified field contract ──────────────────────────
extract:
  session_id:
    from: events                       # UUID in first line's sessionId field
    path: "sessionId"
    strategy: first_event_field

  cwd:
    from: config_file                  # reverse-lookup in Gemini's projects.json
    lookup_file: ${HOME}/.gemini/projects.json
    key_source: parent_parent_dir_name # session path ancestor = project name
    container_path: "projects"         # JSON root → projects → { cwd: name }

  title:
    from: events                       # first user turn
    where: 'type == "user"'
    path: "content.0.text"
    transforms: [first_line, "truncate:60"]

  updated_at:
    from: events
    strategy: file_mtime

  state:
    from: events
    last_event_map:
      "user":   busy
      "gemini": waiting

  tab_title:
    from: cwd
    strategy: cwd_basename

# ── PROCESS: is it running? ──────────────────────────────────
process:
  executable: gemini
  script_contains: "gemini.js"         # tighten match to actual script
  match:
    field: session_id                  # what to look for
    on: contains                       # where: anywhere in cmdline (loose)
  fallback:
    recently_active_secs: 1800         # no session_id on cmdline; recency is primary
