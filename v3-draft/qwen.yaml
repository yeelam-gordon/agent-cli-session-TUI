# Qwen Code — v3 schema (explicit sources, unified extract)
name: qwen
display_name: Qwen Code

# ── FILES: what we read ──────────────────────────────────────
files:
  events: "{session_file}"             # one .jsonl per session

# ── DISCOVERY: how to find sessions ──────────────────────────
discovery:
  base_dir: ${HOME}/.qwen/projects
  strategy: file_per_session
  glob: "*/chats/*.jsonl"

# ── EVENTS: pre-processing before extraction ─────────────────
events:
  filter_out:
    - 'type == "system"'               # ui_telemetry noise

# ── EXTRACT: unified field contract ──────────────────────────
extract:
  session_id:
    from: filename_stem                # filename IS the UUID

  cwd:
    from: events                       # every event carries literal cwd field
    where: 'type == "user"'
    path: "cwd"

  title:
    from: events                       # first user message
    where: 'type == "user"'
    path: "message.parts.0.text"
    transforms: [first_line, "truncate:60"]

  updated_at:
    from: events
    strategy: file_mtime

  state:
    from: events
    last_event_map:
      "assistant": waiting
      "user":      busy

  tab_title:
    from: cwd
    strategy: cwd_basename

# ── PROCESS: is it running? ──────────────────────────────────
process:
  executable: qwen
  match:
    field: session_id                  # what to look for
    on: positional_arg                 # where: bare arg on cmdline (resumed sessions only)
  fallback:
    recently_active_secs: 1800         # fresh sessions have no session_id on cmdline
